<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #1A202C; }
    .subtitle { font-size: 16px; font-weight: bold; fill: #1A202C; }
    .label { fill: #1A202C; font-weight: 600; }
    .value { fill: #2D3748; }
    .conops-bg { fill: #E6F4EA; stroke: #2F855A; stroke-width: 1.5; rx: 8; ry: 8; }
    .opscon-bg { fill: #EBF8FF; stroke: #2B6CB0; stroke-width: 1.5; rx: 8; ry: 8; }
    .row-conops { fill: #FFFFFF; stroke: #2F855A; stroke-width: 1; rx: 4; ry: 4; }
    .row-opscon { fill: #FFFFFF; stroke: #2B6CB0; stroke-width: 1; rx: 4; ry: 4; }
    .arrow { stroke: #2D3748; stroke-width: 2; fill: none; }
    .arrow-label { fill: #2D3748; font-size: 12px; font-style: italic; font-weight: 600; }
    .foot { font-size: 11px; fill: #4A5568; font-style: italic; }
  </style>

  <text x="550" y="32" text-anchor="middle" class="title">ConOps vs OpsCon — Two Viewpoints on One Capability</text>

  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D3748"/>
    </marker>
  </defs>

  <!-- ConOps column -->
  <rect x="50" y="70" width="430" height="500" class="conops-bg"/>
  <text x="265" y="100" text-anchor="middle" class="subtitle" fill="#22543D">ConOps — ISO 29148 §4.2</text>

  <rect x="80" y="120" width="370" height="90" class="row-conops"/>
  <text x="100" y="145" class="label">Perspective</text>
  <text x="100" y="170" class="value">Acquirer / User</text>

  <rect x="80" y="225" width="370" height="90" class="row-conops"/>
  <text x="100" y="250" class="label">Author</text>
  <text x="100" y="275" class="value">Acquirer (or acquirer's SE)</text>

  <rect x="80" y="330" width="370" height="90" class="row-conops"/>
  <text x="100" y="355" class="label">Audience</text>
  <text x="100" y="380" class="value">Stakeholders, acquirer leadership, supplier</text>

  <rect x="80" y="435" width="370" height="120" class="row-conops"/>
  <text x="100" y="460" class="label">Typical content</text>
  <text x="100" y="485" class="value">Mission, users,</text>
  <text x="100" y="505" class="value">operational scenarios,</text>
  <text x="100" y="525" class="value">capability in environment</text>

  <!-- OpsCon column -->
  <rect x="620" y="70" width="430" height="500" class="opscon-bg"/>
  <text x="835" y="100" text-anchor="middle" class="subtitle" fill="#2A4365">OpsCon — ISO 29148 §4.3</text>

  <rect x="650" y="120" width="370" height="90" class="row-opscon"/>
  <text x="670" y="145" class="label">Perspective</text>
  <text x="670" y="170" class="value">Supplier / System developer</text>

  <rect x="650" y="225" width="370" height="90" class="row-opscon"/>
  <text x="670" y="250" class="label">Author</text>
  <text x="670" y="275" class="value">Supplier (or supplier's SE)</text>

  <rect x="650" y="330" width="370" height="90" class="row-opscon"/>
  <text x="670" y="355" class="label">Audience</text>
  <text x="670" y="380" class="value">Developers, architects, V&amp;V engineers</text>

  <rect x="650" y="435" width="370" height="120" class="row-opscon"/>
  <text x="670" y="460" class="label">Typical content</text>
  <text x="670" y="485" class="value">System modes, operational</text>
  <text x="670" y="505" class="value">characteristics, interfaces,</text>
  <text x="670" y="525" class="value">performance profiles</text>

  <!-- Arrow between columns -->
  <line x1="490" y1="320" x2="615" y2="320" class="arrow" marker-end="url(#ah2)"/>
  <text x="552" y="310" text-anchor="middle" class="arrow-label">derives /</text>
  <text x="552" y="345" text-anchor="middle" class="arrow-label">informs</text>

  <text x="550" y="610" text-anchor="middle" class="foot">
    Source: ISO/IEC/IEEE 29148:2018 §4.2 and §4.3; INCOSE SEH5 Ch3 — CSEP Week 3 Diagram 2
  </text>
</svg>
